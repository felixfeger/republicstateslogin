<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>body{font-family:Arial,sans-serif;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;padding-top:50px;}h1{color:#333;}</style>
</head>
<body>
<h1 id="welcome">Welcome to your dashboard</h1>
<script>
const WORKER_URL = 'https://sso-api.felixfeger46.workers.dev';

(async()=>{
  const token = localStorage.getItem('sessionToken');
  if(!token){window.location.href='/index.html';return;}
  const res = await fetch(`${WORKER_URL}/check-session`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
  const check = await res.json();
  if(!check.valid){window.location.href='/index.html';return;}
  const userRes = await fetch(`${WORKER_URL}/get-user`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
  const user = await userRes.json();
  document.getElementById('welcome').textContent = `Welcome ${user.username} to your dashboard`;
})();
</script>
</body>
</html>
